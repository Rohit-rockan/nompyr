services:
  - type: web
    name: nompyr-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:10000 --chdir backend app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: RENDER_DISK_PATH
        value: /data
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
